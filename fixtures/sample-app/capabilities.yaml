# Machine-readable map of what sample-app implements vs what acceptance-full.md
# targets. Update `implemented` when extending the fixture; remove matching items
# from `planned` when done. Guardrail tests in tests/test_phase_guardrails.py
# enforce consistency.
version: "1"

implemented:
  api:
    - method: GET
      path: /health
      expect_status: 200
    - method: POST
      path: /api/tasks
      expect_status: 201
  ui:
    - route: /
      title: Sample App
    - route: /tasks
    - action: create_task
      description: Fill title and description, save, see task in list
  terminal:
    - command: pytest -q

planned:
  api:
    - method: PATCH
      path: /api/tasks/{id}
      expect_status: 200
  ui:
    - action: complete_task
      description: Toggle task complete status on the Tasks page
    - action: delete_task
      description: Delete task with confirmation modal
