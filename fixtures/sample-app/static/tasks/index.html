<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample App - Tasks</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #111111;
      --border: #333333;
      --accent: #0047ab;
      --accent-hover: #003380;
      --danger: #b3261e;
      --danger-hover: #8c1d17;
      --success-bg: #e6f4ea;
      --success-text: #0d652d;
      --muted: #444444;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #121212;
      --text: #f2f2f2;
      --border: #888888;
      --accent: #6ba3ff;
      --accent-hover: #4d8fef;
      --muted: #bbbbbb;
      --success-bg: #1e3a29;
      --success-text: #81c995;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      line-height: 1.5;
    }
    nav {
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 1.125rem;
    }
    nav a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      margin-right: 1rem;
    }
    nav a:hover { text-decoration: underline; }
    h1 { margin-top: 0; font-size: 2rem; }
    .actions {
      margin: 1.25rem 0;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      font-size: 1.125rem;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: #f5f5f5;
      color: var(--text);
    }
    button.primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button.danger {
      background: var(--danger);
      color: #ffffff;
      border-color: var(--danger);
    }
    button.danger:hover { background: var(--danger-hover); border-color: var(--danger-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #search-section {
      max-width: 40rem;
      margin: 1rem 0;
    }
    #search-tasks {
      margin-bottom: 0;
      background: var(--bg);
      color: var(--text);
    }
    .panel {
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1rem 0;
      max-width: 40rem;
      background: var(--bg);
    }
    .panel.hidden { display: none; }
    .panel h2 { margin-top: 0; font-size: 1.35rem; }
    .wizard-step.hidden { display: none; }
    .wizard-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    #import-preview {
      list-style: disc;
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }
    #task-form {
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1rem 0;
      max-width: 40rem;
    }
    #task-form.hidden { display: none; }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.35rem;
      font-size: 1.05rem;
    }
    input[type="text"], textarea {
      width: 100%;
      font-size: 1.05rem;
      padding: 0.6rem 0.75rem;
      border: 2px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    textarea { min-height: 5rem; resize: vertical; }
    #status-message {
      min-height: 1.5rem;
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1.05rem;
    }
    #status-message:empty { display: none; }
    #status-message.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 2px solid var(--success-text);
    }
    #status-message.error {
      background: #fce8e6;
      color: var(--danger);
      border: 2px solid var(--danger);
    }
    #task-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0 0;
      max-width: 40rem;
      max-height: 24rem;
      overflow-y: auto;
      border: 2px solid var(--border);
      border-radius: 8px;
    }
    #task-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1rem;
      font-size: 1.05rem;
    }
    #task-list li:last-child { border-bottom: none; }
    #task-list .empty {
      display: block;
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
    }
    .task-title-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }
    .task-title {
      font-weight: 600;
      word-break: break-word;
      color: var(--accent);
      text-decoration: none;
    }
    .task-title:hover { text-decoration: underline; }
    .task-title.completed {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-badge {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-text);
      white-space: nowrap;
    }
    .task-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .task-actions button {
      font-size: 0.95rem;
      padding: 0.5rem 0.85rem;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: var(--bg);
      color: var(--text);
      border: 3px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 28rem;
      width: calc(100% - 2rem);
    }
    .modal-content h2 { margin-top: 0; }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="/">Home</a>
    <a href="/tasks/" aria-current="page">Tasks</a>
    <a href="/settings/">Settings</a>
  </nav>

  <h1>Tasks</h1>

  <div class="actions">
    <button type="button" id="new-task-btn" class="primary" data-testid="new-task-btn">New Task</button>
    <button type="button" id="import-tasks-btn" data-testid="import-tasks-btn">Import Tasks</button>
    <button type="button" id="demo-tasks-btn" data-testid="load-demo-tasks-btn">Load Demo Tasks</button>
  </div>

  <div id="search-section">
    <label for="search-tasks">Search tasks</label>
    <input type="text" id="search-tasks" placeholder="Type to filter by title" autocomplete="off" data-testid="search-tasks-input">
  </div>

  <div id="status-message" role="status" aria-live="polite"></div>

  <form id="task-form" class="hidden" aria-label="Create task" data-testid="task-form">
    <label for="task-title">Title</label>
    <input type="text" id="task-title" name="title" required autocomplete="off" data-testid="task-title">
    <label for="task-description">Description</label>
    <textarea id="task-description" name="description" rows="4" data-testid="task-description"></textarea>
    <button type="submit" class="primary" data-testid="save-task-btn">Save Task</button>
    <button type="button" id="cancel-btn" data-testid="cancel-task-btn">Cancel</button>
  </form>

  <div id="import-wizard" class="panel hidden" data-testid="import-wizard">
    <h2>Import tasks</h2>
    <div class="wizard-step" data-step="1" data-testid="import-step-1">
      <p>Paste one task title per line.</p>
      <label for="import-text">Task titles</label>
      <textarea id="import-text" rows="6" data-testid="import-text"></textarea>
      <div class="wizard-actions">
        <button type="button" id="import-cancel-btn">Cancel</button>
        <button type="button" id="import-next-1-btn" class="primary" data-testid="import-next-btn">Next</button>
      </div>
    </div>
    <div class="wizard-step hidden" data-step="2" data-testid="import-step-2">
      <p>Preview tasks to import:</p>
      <ul id="import-preview" data-testid="import-preview"></ul>
      <div class="wizard-actions">
        <button type="button" id="import-back-2-btn" data-testid="import-back-btn">Back</button>
        <button type="button" id="import-next-2-btn" class="primary">Next</button>
      </div>
    </div>
    <div class="wizard-step hidden" data-step="3" data-testid="import-step-3">
      <p id="import-confirm-message"></p>
      <div class="wizard-actions">
        <button type="button" id="import-back-3-btn">Back</button>
        <button type="button" id="import-confirm-btn" class="primary" data-testid="import-confirm-btn">Confirm Import</button>
      </div>
    </div>
  </div>

  <h2>Task list</h2>
  <ul id="task-list" aria-label="Task list" data-testid="task-list" data-ready="false">
    <li class="empty">No tasks yet. Click New Task to add one.</li>
  </ul>

  <div id="delete-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title" data-testid="delete-modal">
    <div class="modal-content">
      <h2 id="delete-modal-title">Delete task?</h2>
      <p id="delete-modal-message"></p>
      <div class="modal-actions">
        <button type="button" id="delete-cancel-btn" data-testid="delete-cancel-btn">Cancel</button>
        <button type="button" id="delete-confirm-btn" class="danger" data-testid="delete-confirm-btn">Confirm Delete</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "";
    const SETTINGS_KEY = "sample-app-settings";

    const newTaskBtn = document.getElementById("new-task-btn");
    const importTasksBtn = document.getElementById("import-tasks-btn");
    const demoTasksBtn = document.getElementById("demo-tasks-btn");
    const taskForm = document.getElementById("task-form");
    const cancelBtn = document.getElementById("cancel-btn");
    const statusMessage = document.getElementById("status-message");
    const taskList = document.getElementById("task-list");
    const titleInput = document.getElementById("task-title");
    const descriptionInput = document.getElementById("task-description");
    const searchInput = document.getElementById("search-tasks");
    const deleteModal = document.getElementById("delete-modal");
    const deleteModalMessage = document.getElementById("delete-modal-message");
    const deleteCancelBtn = document.getElementById("delete-cancel-btn");
    const deleteConfirmBtn = document.getElementById("delete-confirm-btn");
    const importWizard = document.getElementById("import-wizard");
    const importText = document.getElementById("import-text");
    const importPreview = document.getElementById("import-preview");
    const importConfirmMessage = document.getElementById("import-confirm-message");

    let pendingDeleteTask = null;
    let allTasks = [];
    let importTitles = [];

    function readSettings() {
      try {
        return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
      } catch (_err) {
        return {};
      }
    }

    function applyThemeFromSettings() {
      const settings = readSettings();
      document.documentElement.dataset.theme = settings.theme === "dark" ? "dark" : "light";
    }

    function sortTasks(tasks) {
      const sort = readSettings().sort || "newest";
      const copy = tasks.slice();
      if (sort === "oldest") {
        copy.sort(function (a, b) { return a.id - b.id; });
      } else if (sort === "title") {
        copy.sort(function (a, b) {
          return a.title.localeCompare(b.title, undefined, { sensitivity: "base" });
        });
      } else {
        copy.sort(function (a, b) { return b.id - a.id; });
      }
      return copy;
    }

    function filteredTasks() {
      const query = searchInput.value.trim().toLowerCase();
      const sorted = sortTasks(allTasks);
      if (!query) return sorted;
      return sorted.filter(function (task) {
        return task.title.toLowerCase().includes(query);
      });
    }

    function refreshTaskList() {
      renderTasks(filteredTasks());
    }

    function setStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = type || "";
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "";
    }

    function showForm() {
      clearStatus();
      taskForm.classList.remove("hidden");
      titleInput.focus();
    }

    function hideForm() {
      taskForm.classList.add("hidden");
      taskForm.reset();
    }

    function showDeleteModal(task) {
      pendingDeleteTask = task;
      deleteModalMessage.textContent = 'Are you sure you want to delete "' + task.title + '"?';
      deleteModal.classList.remove("hidden");
      deleteCancelBtn.focus();
    }

    function hideDeleteModal() {
      pendingDeleteTask = null;
      deleteModal.classList.add("hidden");
    }

    function showImportWizard() {
      clearStatus();
      importTitles = [];
      importText.value = "";
      importWizard.classList.remove("hidden");
      showImportStep(1);
      importText.focus();
    }

    function hideImportWizard() {
      importWizard.classList.add("hidden");
      importTitles = [];
    }

    function showImportStep(step) {
      importWizard.querySelectorAll(".wizard-step").forEach(function (panel) {
        panel.classList.toggle("hidden", Number(panel.dataset.step) !== step);
      });
    }

    function parseImportTitles() {
      return importText.value
        .split("\n")
        .map(function (line) { return line.trim(); })
        .filter(function (line) { return line.length > 0; });
    }

    function renderTasks(tasks) {
      taskList.innerHTML = "";
      if (!tasks.length) {
        const item = document.createElement("li");
        item.className = "empty";
        item.textContent = allTasks.length
          ? "No tasks match your search."
          : "No tasks yet. Click New Task to add one.";
        taskList.appendChild(item);
        taskList.dataset.ready = "true";
        return;
      }

      for (const task of tasks) {
        const item = document.createElement("li");
        item.dataset.taskId = String(task.id);
        item.dataset.testid = "task-item";

        const titleWrap = document.createElement("div");
        titleWrap.className = "task-title-wrap";

        const title = document.createElement("a");
        title.className = "task-title" + (task.completed ? " completed" : "");
        title.href = "/tasks/" + task.id;
        title.textContent = task.title;
        title.dataset.testid = "task-title-link";
        titleWrap.appendChild(title);

        if (task.completed) {
          const badge = document.createElement("span");
          badge.className = "task-badge";
          badge.textContent = "Done";
          badge.dataset.testid = "task-done-badge";
          titleWrap.appendChild(badge);
        }

        const actions = document.createElement("div");
        actions.className = "task-actions";

        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.dataset.testid = task.completed ? "mark-active-btn" : "mark-done-btn";
        toggleBtn.textContent = task.completed ? "Mark Active" : "Mark Done";
        toggleBtn.addEventListener("click", function () {
          toggleComplete(task.id, !task.completed);
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.dataset.testid = "delete-task-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", function () {
          showDeleteModal(task);
        });

        actions.appendChild(toggleBtn);
        actions.appendChild(deleteBtn);
        item.appendChild(titleWrap);
        item.appendChild(actions);
        taskList.appendChild(item);
      }
      taskList.dataset.ready = "true";
    }

    async function loadTasks() {
      try {
        const response = await fetch(API_BASE + "/api/tasks");
        if (!response.ok) {
          throw new Error("Failed to load tasks (" + response.status + ")");
        }
        allTasks = await response.json();
        refreshTaskList();
      } catch (err) {
        taskList.innerHTML = "";
        const item = document.createElement("li");
        item.className = "empty";
        item.textContent = "Could not load tasks. Is the API server running?";
        taskList.appendChild(item);
        taskList.dataset.ready = "true";
        setStatus(err.message, "error");
      }
    }

    async function saveTask(event) {
      event.preventDefault();
      clearStatus();

      const title = titleInput.value.trim();
      const description = descriptionInput.value.trim();
      if (!title) {
        setStatus("Title is required.", "error");
        titleInput.focus();
        return;
      }

      const saveBtn = taskForm.querySelector('button[type="submit"]');
      saveBtn.disabled = true;
      try {
        const response = await fetch(API_BASE + "/api/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: title, description: description }),
        });
        if (!response.ok) {
          const errorBody = await response.json().catch(() => ({}));
          throw new Error(errorBody.error || "Save failed (" + response.status + ")");
        }
        const created = await response.json();
        hideForm();
        setStatus('Task "' + created.title + '" saved successfully.', "success");
        await loadTasks();
      } catch (err) {
        setStatus(err.message, "error");
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function toggleComplete(taskId, completed) {
      clearStatus();
      try {
        const response = await fetch(API_BASE + "/api/tasks/" + taskId, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed: completed }),
        });
        if (!response.ok) {
          const errorBody = await response.json().catch(() => ({}));
          throw new Error(errorBody.error || "Update failed (" + response.status + ")");
        }
        const updated = await response.json();
        setStatus(
          'Task "' + updated.title + '" marked ' + (updated.completed ? "done" : "active") + ".",
          "success"
        );
        await loadTasks();
      } catch (err) {
        setStatus(err.message, "error");
      }
    }

    async function confirmDelete() {
      if (!pendingDeleteTask) return;
      const task = pendingDeleteTask;
      hideDeleteModal();
      clearStatus();
      try {
        const response = await fetch(API_BASE + "/api/tasks/" + task.id, { method: "DELETE" });
        if (!response.ok && response.status !== 204) {
          const errorBody = await response.json().catch(() => ({}));
          throw new Error(errorBody.error || "Delete failed (" + response.status + ")");
        }
        setStatus('Task "' + task.title + '" deleted.', "success");
        await loadTasks();
      } catch (err) {
        setStatus(err.message, "error");
      }
    }

    async function loadDemoTasks() {
      clearStatus();
      demoTasksBtn.disabled = true;
      try {
        for (let index = 1; index <= 15; index += 1) {
          const response = await fetch(API_BASE + "/api/tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: "Demo task " + index,
              description: "Seeded for scroll testing",
            }),
          });
          if (!response.ok) {
            throw new Error("Failed to seed demo task " + index);
          }
        }
        setStatus("Loaded 15 demo tasks.", "success");
        await loadTasks();
      } catch (err) {
        setStatus(err.message, "error");
      } finally {
        demoTasksBtn.disabled = false;
      }
    }

    async function confirmImport() {
      clearStatus();
      const confirmBtn = document.getElementById("import-confirm-btn");
      confirmBtn.disabled = true;
      try {
        for (const title of importTitles) {
          const response = await fetch(API_BASE + "/api/tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: title, description: "Imported via wizard" }),
          });
          if (!response.ok) {
            throw new Error('Failed to import "' + title + '"');
          }
        }
        hideImportWizard();
        setStatus("Imported " + importTitles.length + " task(s).", "success");
        await loadTasks();
      } catch (err) {
        setStatus(err.message, "error");
      } finally {
        confirmBtn.disabled = false;
      }
    }

    newTaskBtn.addEventListener("click", showForm);
    importTasksBtn.addEventListener("click", showImportWizard);
    demoTasksBtn.addEventListener("click", loadDemoTasks);
    cancelBtn.addEventListener("click", hideForm);
    taskForm.addEventListener("submit", saveTask);
    searchInput.addEventListener("input", refreshTaskList);
    deleteCancelBtn.addEventListener("click", hideDeleteModal);
    deleteConfirmBtn.addEventListener("click", confirmDelete);

    document.getElementById("import-cancel-btn").addEventListener("click", hideImportWizard);
    document.getElementById("import-next-1-btn").addEventListener("click", function () {
      importTitles = parseImportTitles();
      if (!importTitles.length) {
        setStatus("Enter at least one task title to import.", "error");
        return;
      }
      importPreview.innerHTML = "";
      for (const title of importTitles) {
        const item = document.createElement("li");
        item.textContent = title;
        importPreview.appendChild(item);
      }
      showImportStep(2);
    });
    document.getElementById("import-back-2-btn").addEventListener("click", function () {
      showImportStep(1);
    });
    document.getElementById("import-next-2-btn").addEventListener("click", function () {
      importConfirmMessage.textContent =
        "Import " + importTitles.length + " task(s) into your list?";
      showImportStep(3);
    });
    document.getElementById("import-back-3-btn").addEventListener("click", function () {
      showImportStep(2);
    });
    document.getElementById("import-confirm-btn").addEventListener("click", confirmImport);

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !deleteModal.classList.contains("hidden")) {
        hideDeleteModal();
      }
    });

    applyThemeFromSettings();
    loadTasks();
  </script>
</body>
</html>
