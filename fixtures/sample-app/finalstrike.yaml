# finalstrike.yaml — orchestration config for sample-app fixture
version: "1"

project:
  name: sample-app

llm:
  provider: openai_compat
  base_url: http://localhost:11434/v1
  model: llama3

build:
  commands:
    - name: install
      run: pip install -r requirements.txt

tests:
  commands:
    - name: unit
      run: pytest -q

api:
  base_url: http://localhost:8080
  health:
    - method: GET
      path: /health
      expect_status: 200

ui:
  base_url: http://localhost:3000
  browser: chromium
  smoke_route: /

secrets:
  file: .finalstrike/secrets.env

evidence:
  video: true
  screenshots: true
  output_dir: .finalstrike/runs

policy:
  fail_fast: false
  max_ui_steps: 40
  max_ui_retries: 4
